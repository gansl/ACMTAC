<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INR Clinic Tracker</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#16243C; --ink-soft:#3A4A63; --paper:#F6F4EE; --card:#FFFFFF; --line:#DCD7C9;
    --accent:#8C2F26; --accent-soft:#F3E3DF; --good:#1E6B4E; --good-soft:#E2F0E9;
    --warn:#A8631B; --warn-soft:#F7E9D6; --mono:'JetBrains Mono','Courier New',monospace;
    --serif:'Source Serif 4', Georgia, serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:var(--sans); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .app{display:flex; min-height:100vh;}
  .sidebar{width:300px; flex-shrink:0; background:var(--ink); color:#F1EEE5; display:flex; flex-direction:column; padding:20px 16px;}
  .brand{font-family:var(--serif); font-size:21px; margin:0 0 2px 4px;}
  .brand span{color:#D98A7E;}
  .brand-sub{font-size:11px; color:#9AA6BC; margin:0 0 18px 4px; text-transform:uppercase; letter-spacing:1.2px;}
  .nav-switch{display:flex; gap:6px; margin-bottom:14px;}
  .nav-btn{flex:1; padding:8px; border-radius:7px; border:1px solid #2C3C57; background:#1E2E48; color:#C7D0E0; font-size:12px; font-weight:600; cursor:pointer; text-align:center;}
  .nav-btn.active{background:var(--accent); border-color:#5C3A33; color:#fff;}
  .search{width:100%; padding:9px 12px; border-radius:8px; border:1px solid #2C3C57; background:#1E2E48; color:#F1EEE5; font-size:13px; margin-bottom:12px;}
  .search::placeholder{color:#7E8BA3;}
  .btn-add{width:100%; padding:10px; border-radius:8px; border:1px solid #5C3A33; background:var(--accent); color:#fff; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:16px;}
  .btn-add:hover{background:#762620;}
  .patient-list{flex:1; overflow-y:auto;}
  .patient-row{padding:11px 10px; border-radius:8px; cursor:pointer; margin-bottom:4px; border:1px solid transparent;}
  .patient-row:hover{background:#1E2E48;}
  .patient-row.active{background:#243958; border-color:#3A5378;}
  .patient-row .pname{font-size:14px; font-weight:600; color:#F1EEE5;}
  .patient-row .pmrn{font-size:11px; color:#8C99B2; font-family:var(--mono);}
  .ttr-pill{display:inline-block; font-family:var(--mono); font-size:11px; font-weight:700; padding:2px 7px; border-radius:20px; margin-top:5px;}
  .ttr-good{background:#163A2E; color:#79D9A8;}
  .ttr-bad{background:#3C1C1A; color:#E89189;}
  .ttr-none{background:#26344A; color:#8C99B2;}
  .empty-list{color:#7E8BA3; font-size:13px; padding:12px 4px; line-height:1.5;}
  .main{flex:1; padding:32px 40px; max-width:980px;}
  .placeholder{display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:70vh; color:var(--ink-soft);}
  .placeholder h1{font-family:var(--serif); font-size:30px; margin:0 0 8px;}
  .placeholder p{font-size:14px; max-width:460px; line-height:1.6;}
  .patient-header{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:22px;}
  .patient-header h1{font-family:var(--serif); font-size:28px; margin:0 0 4px;}
  .patient-header .meta{font-size:13px; color:var(--ink-soft); font-family:var(--mono);}
  .header-stats{display:flex; gap:14px;}
  .stat-box{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 16px; text-align:center; min-width:90px;}
  .stat-box .label{font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-soft);}
  .stat-box .value{font-family:var(--mono); font-size:22px; font-weight:700; margin-top:2px;}
  .stat-box.alert{border-color:var(--accent); background:var(--accent-soft);}
  .stat-box.alert .value{color:var(--accent);}
  .stat-box.ok .value{color:var(--good);}
  .alert-banner{background:var(--accent-soft); border:1px solid #D9B3AC; color:var(--accent); border-radius:10px; padding:12px 16px; font-size:13px; margin-bottom:20px; display:flex; gap:10px; align-items:flex-start; line-height:1.5;}
  .tabs{display:flex; gap:4px; margin-bottom:22px; border-bottom:1px solid var(--line);}
  .tab{padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-1px;}
  .tab.active{color:var(--ink); border-bottom-color:var(--accent);}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px 24px; margin-bottom:18px;}
  .card h3{font-size:14px; margin:0 0 14px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-soft);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:12px; font-weight:600; color:var(--ink-soft);}
  .field input, .field select, .field textarea{padding:9px 10px; border-radius:7px; border:1px solid var(--line); font-size:13.5px; background:#FCFBF7; color:var(--ink); font-family:var(--sans);}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .checklist{display:flex; flex-direction:column; gap:7px;}
  .checklist label{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:400; color:var(--ink); cursor:pointer;}
  .span2{grid-column:span 2;}
  .row-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:8px;}
  .btn{padding:9px 18px; border-radius:7px; border:1px solid var(--line); background:#FCFBF7; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink);}
  .btn:hover{background:#F0EEE4;}
  .btn-primary{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn-primary:hover{background:#0E1A2C;}
  .btn-danger{color:var(--accent); border-color:#D9B3AC; background:var(--accent-soft);}
  table.history{width:100%; border-collapse:collapse; font-size:13px;}
  table.history th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line);}
  table.history td{padding:9px 10px; border-bottom:1px solid #EEEAE0; vertical-align:top;}
  table.history tr:last-child td{border-bottom:none;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; font-family:var(--mono);}
  .badge-good{background:var(--good-soft); color:var(--good);}
  .badge-bad{background:var(--accent-soft); color:var(--accent);}
  .tag{display:inline-block; font-size:11px; background:#EFEAE0; color:var(--ink-soft); padding:2px 7px; border-radius:5px; margin:2px 3px 0 0;}
  .empty-state{color:var(--ink-soft); font-size:13px; padding:20px 4px; line-height:1.6;}
  .hint{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .modal-bg{position:fixed; inset:0; background:rgba(22,36,60,0.45); display:none; align-items:center; justify-content:center; z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--card); border-radius:12px; padding:24px 28px; width:380px; max-width:90vw;}
  .modal h3{margin:0 0 14px; font-family:var(--serif); font-size:19px;}
  .suggestion-box{background:var(--good-soft); border:1px solid #BBD9CB; border-radius:9px; padding:12px 14px; font-size:13px; line-height:1.6; color:var(--good); margin-top:12px;}
  .config-warning{background:var(--warn-soft); border:1px solid #E0BC8C; color:var(--warn); border-radius:10px; padding:14px 18px; font-size:13px; line-height:1.6; margin-bottom:20px;}
  .login-screen{display:flex; align-items:center; justify-content:center; min-height:100vh; width:100%; background:var(--paper);}
  .login-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:36px 34px; width:340px; max-width:90vw;}
  .login-card .brand{color:var(--ink); margin-bottom:4px;}
  .login-card .brand-sub{color:var(--ink-soft); margin-bottom:22px;}
  .login-error{color:var(--accent); font-size:12.5px; margin-top:8px; min-height:16px;}
  .logout-row{display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:14px; border-top:1px solid #2C3C57;}
  .logout-row span{font-size:12px; color:#9AA6BC; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:170px;}
  .logout-link{font-size:12px; color:#D98A7E; cursor:pointer; font-weight:600;}
</style>
</head>
<body>

<div class="app" id="appRoot" style="display:none;">
  <div class="sidebar">
    <p class="brand">INR<span>Clinic</span></p>
    <p class="brand-sub">Anticoagulation tracker</p>
    <div class="nav-switch">
      <div class="nav-btn active" id="navPatients" onclick="switchView('patients')">Patients</div>
      <div class="nav-btn" id="navSettings" onclick="switchView('settings')">Dosing rules</div>
    </div>
    <input class="search" id="searchBox" placeholder="Search name or MRN" oninput="renderPatientList()">
    <button class="btn-add" onclick="openNewPatientModal()">+ Add patient</button>
    <div style="display:flex; gap:6px; margin-bottom:16px;">
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="document.getElementById('csvFile').click()">Import CSV</button>
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="downloadCsvTemplate()">Template</button>
    </div>
    <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCsvImport(event)">
    <div class="patient-list" id="patientList"></div>
    <div class="logout-row">
      <span id="sessionEmail"></span>
      <span class="logout-link" onclick="logout()">Sign out</span>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <p class="brand">INR<span style="color:var(--accent);">Clinic</span></p>
    <p class="brand-sub" style="text-transform:uppercase; letter-spacing:1.2px; font-size:11px;">Sign in to continue</p>
    <div class="field" style="margin-bottom:10px;"><label>Email</label><input id="login_email" type="email" placeholder="you@clinic.org"></div>
    <div class="field" style="margin-bottom:6px;"><label>Password</label><input id="login_password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"></div>
    <div class="login-error" id="loginError"></div>
    <div class="row-actions" style="margin-top:10px;"><button class="btn btn-primary" style="width:100%;" id="loginBtn" onclick="login()">Sign in</button></div>
    <p class="hint" style="margin-top:14px;">Access is by invitation only. Ask your administrator to add your email in Supabase &gt; Authentication &gt; Users.</p>
  </div>
</div>

<div class="modal-bg" id="newPatientModal">
  <div class="modal">
    <h3>New patient</h3>
    <div class="field" style="margin-bottom:10px;"><label>Full name</label><input id="np_name" placeholder="e.g. Tan Mei Ling"></div>
    <div class="field" style="margin-bottom:10px;"><label>MRN</label><input id="np_mrn" placeholder="e.g. A1234567"></div>
    <div class="row-actions">
      <button class="btn" onclick="closeNewPatientModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createPatient()">Create</button>
    </div>
  </div>
</div>

<script>
const FACTOR_OPTIONS = [
  "Diet changes","Non-compliance to regime","Drug / supplement interaction",
  "Changes in medical condition","Changes in lifestyle (alcohol/smoking)",
  "Changes in physical activities","Others"
];

const DEFAULT_RULES = {
  below: [
    {maxDeficit:0.5, increasePct:10, note:"Increase weekly dose by 10%."},
    {maxDeficit:999, increasePct:20, note:"Give a stat dose (double the new daily dose), then increase weekly dose by 20%."}
  ],
  above: [
    {maxExcess:0.09, reducePct:0, withholdDays:0, note:"No change. Within acceptable buffer above target."},
    {maxExcess:0.59, reducePct:0, withholdDays:0, note:"No change. Recheck INR in 1 week; if persistently elevated, decrease weekly dose by 5-10%."},
    {maxExcess:1.09, reducePct:10, withholdDays:1, note:"Omit 1 dose, then decrease weekly dose by 10%."},
    {maxExcess:2.0, reducePct:10, withholdDays:2, note:"Omit 2 doses, then decrease weekly dose by 10%."},
    {maxExcess:999, reducePct:0, withholdDays:0, note:"INR critically high — refer to doctor immediately. Do not adjust dose without medical review."}
  ]
};

let sb = null;
let configOk = false;
let patients = [];
let visitsCache = {};
let rulesCache = null;
let currentPatientId = null;
let currentTab = "profile";
let currentView = "patients";
let currentSession = null;

function initSupabase(){
  const cfg = window.APP_CONFIG || {};
  if(!cfg.SUPABASE_URL || cfg.SUPABASE_URL.includes("YOUR-PROJECT") || !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_ANON_KEY.includes("YOUR-ANON")){
    configOk = false;
    return;
  }
  sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  configOk = true;
}

// ---------- auth ----------
async function login(){
  const email = document.getElementById("login_email").value.trim();
  const password = document.getElementById("login_password").value;
  const errBox = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");
  errBox.innerText = "";
  if(!email || !password){ errBox.innerText = "Enter your email and password."; return; }
  btn.disabled = true; btn.innerText = "Signing in...";
  const {data, error} = await sb.auth.signInWithPassword({email, password});
  btn.disabled = false; btn.innerText = "Sign in";
  if(error){ errBox.innerText = error.message; return; }
  currentSession = data.session;
  await onAuthed();
}
async function logout(){
  await sb.auth.signOut();
  currentSession = null;
  showLoginScreen();
}
function showLoginScreen(){
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appRoot").style.display = "none";
}
async function onAuthed(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appRoot").style.display = "flex";
  document.getElementById("sessionEmail").innerText = currentSession?.user?.email || "";
  patients = await fetchPatients();
  await renderPatientList();
  await renderMain();
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.innerText = s == null ? "" : s;
  return d.innerHTML;
}

// ---------- data layer ----------
function rowToPatient(r){
  return {id:r.id, name:r.name, mrn:r.mrn, phone:r.phone||"", indication:r.indication||"", targetLow:r.target_low, targetHigh:r.target_high, duration:r.duration||""};
}
function patientToRow(p){
  return {id:p.id, name:p.name, mrn:p.mrn, phone:p.phone, indication:p.indication, target_low:p.targetLow, target_high:p.targetHigh, duration:p.duration};
}
function rowToVisit(r){
  return {id:r.id, date:r.date, twd:r.twd, inr:r.inr, factors:r.factors||[], othersText:r.others_text||"", admitDate:r.admit_date||"", admitDx:r.admit_dx||"", planAction:r.plan_action, planDays:r.plan_days, newTwd:r.new_twd, nextAppt:r.next_appt||"", clinicalNote:r.clinical_note||""};
}
function visitToRow(v, patientId){
  return {id:v.id, patient_id:patientId, date:v.date||null, twd:v.twd||null, inr:v.inr||null, factors:v.factors||[], others_text:v.othersText||null, admit_date:v.admitDate||null, admit_dx:v.admitDx||null, plan_action:v.planAction||null, plan_days:v.planDays||null, new_twd:v.newTwd||null, next_appt:v.nextAppt||null, clinical_note:v.clinicalNote||null};
}

async function fetchPatients(){
  const {data, error} = await sb.from("patients").select("*").order("created_at",{ascending:true});
  if(error){ console.error(error); return []; }
  return data.map(rowToPatient);
}
async function upsertPatientRow(p){
  const {error} = await sb.from("patients").upsert(patientToRow(p));
  if(error) console.error(error);
}
async function deletePatientRow(id){
  const {error} = await sb.from("patients").delete().eq("id", id);
  if(error) console.error(error);
}
async function fetchVisits(patientId){
  const {data, error} = await sb.from("visits").select("*").eq("patient_id", patientId).order("date",{ascending:true});
  if(error){ console.error(error); return []; }
  return data.map(rowToVisit);
}
async function insertVisitRow(patientId, visit){
  const {error} = await sb.from("visits").insert(visitToRow(visit, patientId));
  if(error) console.error(error);
}
async function fetchRules(){
  const {data, error} = await sb.from("dosing_rules").select("*").eq("id",1).maybeSingle();
  if(error || !data) return DEFAULT_RULES;
  return data.rules;
}
async function saveRulesRow(rules){
  const {error} = await sb.from("dosing_rules").upsert({id:1, rules});
  if(error) console.error(error);
}

async function loadVisits(patientId){
  if(visitsCache[patientId]) return visitsCache[patientId];
  const visits = await fetchVisits(patientId);
  visitsCache[patientId] = visits;
  return visits;
}
async function getRules(){
  if(rulesCache) return rulesCache;
  rulesCache = await fetchRules();
  return rulesCache;
}

// ---------- Rosendaal TTR ----------
function inRangeDuration(inr1, inr2, days, low, high){
  if(days <= 0) return 0;
  if(inr1 === inr2) return (inr1 >= low && inr1 <= high) ? days : 0;
  const slope = (inr2 - inr1) / days;
  let tLow = (low - inr1) / slope, tHigh = (high - inr1) / slope;
  let lo = Math.max(Math.min(tLow,tHigh), 0);
  let hi = Math.min(Math.max(tLow,tHigh), days);
  return hi < lo ? 0 : hi - lo;
}
function calcTTR(visits, low, high){
  const dated = visits.filter(v => v.date && v.inr !== "" && v.inr !== null && !isNaN(v.inr))
    .map(v => ({date:new Date(v.date), inr:parseFloat(v.inr)})).sort((a,b)=>a.date-b.date);
  if(dated.length < 2) return null;
  let totalDays=0, inRangeDays=0;
  for(let i=1;i<dated.length;i++){
    const days = (dated[i].date - dated[i-1].date) / 86400000;
    if(days<=0) continue;
    totalDays += days;
    inRangeDays += inRangeDuration(dated[i-1].inr, dated[i].inr, days, low, high);
  }
  return totalDays === 0 ? null : (inRangeDays/totalDays)*100;
}

// ---------- Rule-based dosing suggestion ----------
function getRuleSuggestion(inr, low, high, rules){
  if(isNaN(inr)) return null;
  if(inr >= low && inr <= high) return {text:"INR is within target range. Continue current dose.", tone:"good"};
  if(inr < low){
    const deficit = low - inr;
    const tier = rules.below.find(t => deficit <= t.maxDeficit) || rules.below[rules.below.length-1];
    return {text:`Increase total weekly dose by approximately ${tier.increasePct}%. ${tier.note}`, tone:"warn"};
  }
  const excess = inr - high;
  const tier = rules.above.find(t => excess <= t.maxExcess) || rules.above[rules.above.length-1];
  let text = `Reduce total weekly dose by approximately ${tier.reducePct}%.`;
  if(tier.withholdDays) text += ` Withhold dose for ${tier.withholdDays} day(s) first.`;
  text += ` ${tier.note}`;
  return {text, tone:"warn"};
}

// ---------- View switching ----------
function switchView(view){
  currentView = view;
  document.getElementById("navPatients").classList.toggle("active", view==="patients");
  document.getElementById("navSettings").classList.toggle("active", view==="settings");
  if(view === "patients") renderMain();
  else renderSettingsView();
}

// ---------- Sidebar ----------
async function renderPatientList(){
  const list = document.getElementById("patientList");
  if(!configOk){ list.innerHTML = ""; return; }
  const q = document.getElementById("searchBox").value.toLowerCase();
  const filtered = patients.filter(p => p.name.toLowerCase().includes(q) || p.mrn.toLowerCase().includes(q));
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-list">No patients yet. Click "Add patient" to start a record.</div>';
    return;
  }
  list.innerHTML = "";
  for(const p of filtered){
    const visits = await loadVisits(p.id);
    const ttr = calcTTR(visits, parseFloat(p.targetLow), parseFloat(p.targetHigh));
    const row = document.createElement("div");
    row.className = "patient-row" + (p.id === currentPatientId ? " active" : "");
    let pill = ttr===null ? '<span class="ttr-pill ttr-none">TTR --</span>' :
      (ttr<60 ? '<span class="ttr-pill ttr-bad">TTR '+ttr.toFixed(0)+'%</span>' : '<span class="ttr-pill ttr-good">TTR '+ttr.toFixed(0)+'%</span>');
    row.innerHTML = '<div class="pname">'+escapeHtml(p.name)+'</div><div class="pmrn">'+escapeHtml(p.mrn)+'</div>'+pill;
    row.onclick = () => selectPatient(p.id);
    list.appendChild(row);
  }
}

// ---------- New patient ----------
function openNewPatientModal(){
  if(!configOk){ alert("Connect Supabase first (see the setup notice on the right) before adding patients."); return; }
  document.getElementById("np_name").value = "";
  document.getElementById("np_mrn").value = "";
  document.getElementById("newPatientModal").classList.add("show");
}
function closeNewPatientModal(){ document.getElementById("newPatientModal").classList.remove("show"); }
async function createPatient(){
  const name = document.getElementById("np_name").value.trim();
  const mrn = document.getElementById("np_mrn").value.trim();
  if(!name || !mrn){ alert("Enter both name and MRN."); return; }
  const id = "p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
  const patient = {id, name, mrn, phone:"", indication:"", targetLow:2, targetHigh:3, duration:""};
  patients.push(patient);
  await upsertPatientRow(patient);
  visitsCache[id] = [];
  closeNewPatientModal();
  await renderPatientList();
  selectPatient(id);
}

function downloadCsvTemplate(){
  const csv = "name,mrn,phone,indication,target_low,target_high,duration\n"+
    "Tan Mei Ling,A1234567,0123456789,Atrial fibrillation,2,3,Lifelong\n"+
    "Lim Wei Jie,B7654321,0198765432,DVT,2,3,6 months\n";
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "patient_registry_template.csv"; a.click();
  URL.revokeObjectURL(url);
}

function getField(row, ...keys){
  for(const k of keys){
    for(const rk of Object.keys(row)){
      if(rk.trim().toLowerCase() === k.toLowerCase()) return (row[rk]||"").toString().trim();
    }
  }
  return "";
}

async function handleCsvImport(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!configOk){ alert("Connect Supabase first (see config.js) before importing patients."); event.target.value=""; return; }

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: async (results) => {
      let imported = 0, skipped = 0;
      for(const row of results.data){
        const name = getField(row, "name");
        const mrn = getField(row, "mrn");
        if(!name || !mrn){ skipped++; continue; }
        const id = "p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
        const targetLow = parseFloat(getField(row,"target_low","targetLow","target low")) || 2;
        const targetHigh = parseFloat(getField(row,"target_high","targetHigh","target high")) || 3;
        const patient = {
          id, name, mrn,
          phone: getField(row,"phone"),
          indication: getField(row,"indication"),
          targetLow, targetHigh,
          duration: getField(row,"duration")
        };
        patients.push(patient);
        await upsertPatientRow(patient);
        visitsCache[id] = [];
        imported++;
      }
      event.target.value = "";
      await renderPatientList();
      alert("Imported "+imported+" patient(s)."+(skipped ? " Skipped "+skipped+" row(s) missing name or MRN." : ""));
    },
    error: (err) => {
      event.target.value = "";
      alert("Could not read that CSV file: "+err.message);
    }
  });
}

async function selectPatient(id){
  currentPatientId = id;
  currentTab = "profile";
  switchView("patients");
  await renderPatientList();
  await renderMain();
}

// ---------- Main render ----------
async function renderMain(){
  const main = document.getElementById("main");
  if(!configOk){
    main.innerHTML = configWarningHtml();
    return;
  }
  if(!currentPatientId){
    main.innerHTML = '<div class="placeholder"><h1>Select or add a patient</h1><p>Track INR reviews, dosing decisions and ward admissions per patient. TTR is calculated automatically with the Rosendaal method, and patients below 60% are flagged. Use "Dosing rules" in the sidebar to tune the suggestion thresholds.</p></div>';
    return;
  }
  const p = patients.find(x => x.id === currentPatientId);
  const visits = await loadVisits(currentPatientId);
  const low = parseFloat(p.targetLow), high = parseFloat(p.targetHigh);
  const ttr = calcTTR(visits, low, high);
  const lastVisit = visits.slice().filter(v=>v.date).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  let alertHtml = "";
  if(ttr !== null && ttr < 60){
    alertHtml = '<div class="alert-banner"><span>&#9888;</span><div><b>Low TTR alert.</b> Time-in-therapeutic-range is '+ttr.toFixed(0)+'%, below the 60% quality threshold. Review dosing, compliance, and contributing factors at the next visit.</div></div>';
  }

  main.innerHTML =
    '<div class="patient-header">'+
      '<div><h1>'+escapeHtml(p.name)+'</h1><div class="meta">MRN '+escapeHtml(p.mrn)+(p.indication?' &middot; '+escapeHtml(p.indication):'')+'</div></div>'+
      '<div class="header-stats">'+
        '<div class="stat-box '+(ttr===null?'':(ttr<60?'alert':'ok'))+'"><div class="label">TTR</div><div class="value">'+(ttr===null?'--':ttr.toFixed(0)+'%')+'</div></div>'+
        '<div class="stat-box"><div class="label">Target INR</div><div class="value">'+(p.targetLow??'--')+'&ndash;'+(p.targetHigh??'--')+'</div></div>'+
        '<div class="stat-box"><div class="label">Last INR</div><div class="value">'+(lastVisit?lastVisit.inr:'--')+'</div></div>'+
      '</div>'+
    '</div>'+
    alertHtml+
    '<div class="tabs">'+tabBtn('profile','Patient info')+tabBtn('review','New review')+tabBtn('history','History & TTR')+'</div>'+
    '<div id="panelProfile" class="panel"></div>'+
    '<div id="panelReview" class="panel"></div>'+
    '<div id="panelHistory" class="panel"></div>';

  renderProfilePanel(p);
  await renderReviewPanel(p);
  renderHistoryPanel(p, visits, ttr);
  showTab(currentTab);
}

function configWarningHtml(){
  return '<div class="config-warning"><b>Not connected to Supabase yet.</b><br>Edit <code>config.js</code> with your Supabase project URL and anon key, then reload this page. See README.md for the full setup steps (Supabase, GitHub, Vercel).</div>'+
    '<div class="placeholder"><h1>Set up your database first</h1><p>Once connected, patient records, reviews, your dosing rules, and uploaded references will sync automatically across any computer that opens this site.</p></div>';
}

function tabBtn(key,label){ return '<div class="tab" data-tab="'+key+'" onclick="showTab(\''+key+'\')">'+label+'</div>'; }
function showTab(key){
  currentTab = key;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab===key));
  document.getElementById("panelProfile").classList.toggle("active", key==="profile");
  document.getElementById("panelReview").classList.toggle("active", key==="review");
  document.getElementById("panelHistory").classList.toggle("active", key==="history");
}

// ---------- Profile panel ----------
function renderProfilePanel(p){
  const el = document.getElementById("panelProfile");
  el.innerHTML =
    '<div class="card"><h3>Basic information</h3><div class="grid">'+
      field('Name','pf_name',p.name)+field('MRN','pf_mrn',p.mrn)+field('Phone number','pf_phone',p.phone)+
      field('Indication','pf_indication',p.indication)+field('Target INR low','pf_targetLow',p.targetLow,'number','0.1')+
      field('Target INR high','pf_targetHigh',p.targetHigh,'number','0.1')+
      '<div class="field span2"><label>Duration of therapy</label><input id="pf_duration" value="'+escapeHtml(p.duration)+'" placeholder="e.g. 6 months, lifelong"></div>'+
    '</div><div class="row-actions"><button class="btn btn-danger" onclick="deletePatient()">Delete patient</button><button class="btn btn-primary" onclick="saveProfile()">Save changes</button></div></div>';
}
function field(label,id,value,type,step){
  type = type||'text';
  return '<div class="field"><label>'+label+'</label><input id="'+id+'" type="'+type+'" '+(step?('step="'+step+'"'):'')+' value="'+escapeHtml(value??'')+'"></div>';
}
async function saveProfile(){
  const p = patients.find(x => x.id === currentPatientId);
  p.name = document.getElementById("pf_name").value.trim() || p.name;
  p.mrn = document.getElementById("pf_mrn").value.trim() || p.mrn;
  p.phone = document.getElementById("pf_phone").value.trim();
  p.indication = document.getElementById("pf_indication").value.trim();
  p.targetLow = parseFloat(document.getElementById("pf_targetLow").value);
  p.targetHigh = parseFloat(document.getElementById("pf_targetHigh").value);
  p.duration = document.getElementById("pf_duration").value.trim();
  await upsertPatientRow(p);
  await renderPatientList();
  await renderMain();
  showTab("profile");
}
async function deletePatient(){
  if(!confirm("Delete this patient and all their review history? This cannot be undone.")) return;
  await deletePatientRow(currentPatientId);
  patients = patients.filter(x => x.id !== currentPatientId);
  delete visitsCache[currentPatientId];
  currentPatientId = null;
  await renderPatientList();
  await renderMain();
}

// ---------- Review panel ----------
async function renderReviewPanel(p){
  const el = document.getElementById("panelReview");
  const factorChecks = FACTOR_OPTIONS.map(f => '<label><input type="checkbox" class="factor-check" value="'+escapeHtml(f)+'"> '+f+'</label>').join("");

  el.innerHTML =
    '<div class="card"><h3>Review details</h3>'+
      '<div class="grid3" style="margin-bottom:14px;">'+
        '<div class="field"><label>Review date</label><input id="rv_date" type="date"></div>'+
        '<div class="field"><label>Current TWD (mg/week)</label><input id="rv_twd" type="number" step="0.5"></div>'+
        '<div class="field"><label>INR result</label><input id="rv_inr" type="number" step="0.1" onchange="onInrChange()"></div>'+
      '</div>'+
      '<div class="field" style="margin-bottom:6px;"><label>Factors if INR not in range (select all that apply)</label></div>'+
      '<div class="checklist">'+factorChecks+'</div>'+
      '<div class="field span2" id="rv_others_wrap" style="display:none; margin-top:10px;"><label>Other factor (describe)</label><input id="rv_others_text" placeholder="Describe other factor"></div>'+
      '<div id="ruleSuggestionBox"></div>'+
    '</div>'+
    '<div class="card"><h3>Ward admission record (optional)</h3><div class="grid">'+
      '<div class="field"><label>Admission date</label><input id="rv_admit_date" type="date"></div>'+
      '<div class="field"><label>Diagnosis</label><input id="rv_admit_dx" placeholder="e.g. GI bleed"></div>'+
    '</div></div>'+
    '<div class="card"><h3>Plan</h3><div class="grid">'+
      '<div class="field"><label>Action</label><select id="rv_plan_action" onchange="onPlanChange()">'+
        '<option value="continue">Continue dose</option><option value="withhold">Withhold dose</option>'+
        '<option value="load">Load dose</option><option value="increase">Increase dose</option>'+
        '<option value="reduce">Reduce dose</option></select></div>'+
      '<div class="field" id="rv_plan_days_wrap" style="display:none;"><label id="rv_plan_days_label">For how many days</label><input id="rv_plan_days" type="number" min="1"></div>'+
    '</div><div class="grid" style="margin-top:14px;">'+
      '<div class="field"><label>New TWD (mg/week)</label><input id="rv_new_twd" type="number" step="0.5"></div>'+
      '<div class="field"><label>Next appointment</label><input id="rv_next_appt" type="date"></div>'+
    '</div><div class="row-actions"><button class="btn btn-primary" onclick="saveReview()">Save review</button></div></div>';

  document.querySelectorAll(".factor-check").forEach(cb => {
    cb.addEventListener("change", () => {
      const othersChecked = [...document.querySelectorAll(".factor-check")].some(c => c.checked && c.value==="Others");
      document.getElementById("rv_others_wrap").style.display = othersChecked ? "block" : "none";
    });
  });

  onInrChange(p);
}

async function onInrChange(pArg){
  const p = pArg || patients.find(x => x.id === currentPatientId);
  const inrVal = parseFloat(document.getElementById("rv_inr").value);
  const box = document.getElementById("ruleSuggestionBox");
  if(isNaN(inrVal)){ box.innerHTML = ""; return; }
  const rules = await getRules();
  const sug = getRuleSuggestion(inrVal, parseFloat(p.targetLow), parseFloat(p.targetHigh), rules);
  box.innerHTML = sug ? '<div class="suggestion-box"><b>Rule-based suggestion:</b> '+escapeHtml(sug.text)+'</div>' : "";
}

function onPlanChange(){
  const action = document.getElementById("rv_plan_action").value;
  const wrap = document.getElementById("rv_plan_days_wrap");
  const label = document.getElementById("rv_plan_days_label");
  if(action==="withhold"){ wrap.style.display="block"; label.innerText="Withhold for how many days"; }
  else if(action==="load"){ wrap.style.display="block"; label.innerText="Load dose for how many days"; }
  else wrap.style.display="none";
}

async function saveReview(){
  const date = document.getElementById("rv_date").value;
  if(!date){ alert("Enter a review date."); return; }
  const factors = [...document.querySelectorAll(".factor-check")].filter(c=>c.checked).map(c=>c.value);
  const othersText = document.getElementById("rv_others_text").value.trim();
  const ruleBox = document.querySelector("#ruleSuggestionBox .suggestion-box");

  const visit = {
    id:"v_"+Date.now(), date,
    twd: document.getElementById("rv_twd").value,
    inr: document.getElementById("rv_inr").value,
    factors, othersText,
    admitDate: document.getElementById("rv_admit_date").value,
    admitDx: document.getElementById("rv_admit_dx").value.trim(),
    planAction: document.getElementById("rv_plan_action").value,
    planDays: document.getElementById("rv_plan_days").value,
    newTwd: document.getElementById("rv_new_twd").value,
    nextAppt: document.getElementById("rv_next_appt").value,
    clinicalNote: ruleBox ? ruleBox.innerText.replace("Rule-based suggestion: ","") : ""
  };

  await insertVisitRow(currentPatientId, visit);
  const visits = await loadVisits(currentPatientId);
  visits.push(visit);
  visitsCache[currentPatientId] = visits;
  await renderPatientList();
  await renderMain();
  showTab("history");
}

// ---------- History panel ----------
function planLabel(v){
  const map = {continue:"Continue dose", withhold:"Withhold dose", load:"Load dose", increase:"Increase dose", reduce:"Reduce dose"};
  let s = map[v.planAction] || v.planAction;
  if((v.planAction==="withhold"||v.planAction==="load") && v.planDays) s += " ("+v.planDays+"d)";
  return s;
}
function renderHistoryPanel(p, visits, ttr){
  const el = document.getElementById("panelHistory");
  const sorted = visits.slice().sort((a,b) => new Date(b.date)-new Date(a.date));

  let ttrSummary = '<div class="card"><h3>Time in therapeutic range</h3>';
  if(ttr === null){
    ttrSummary += '<div class="empty-state">Need at least two dated INR readings to calculate TTR (Rosendaal method).</div>';
  } else {
    const cls = ttr<60 ? 'badge-bad' : 'badge-good';
    ttrSummary += '<p style="font-size:14px; line-height:1.6; margin:0;">Overall TTR for target range '+p.targetLow+'&ndash;'+p.targetHigh+': <span class="badge '+cls+'" style="font-size:14px; padding:3px 10px;">'+ttr.toFixed(1)+'%</span>'+
      (ttr<60 ? '<br><span style="color:var(--accent); font-size:13px;">Below the 60% quality threshold &mdash; flagged for review.</span>' : '<br><span style="color:var(--good); font-size:13px;">Within acceptable control (&ge;60%).</span>')+'</p>';
  }
  ttrSummary += '</div>';

  let rows = "";
  if(sorted.length === 0){
    rows = '<tr><td colspan="6" class="empty-state">No reviews recorded yet. Add one under "New review".</td></tr>';
  } else {
    for(const v of sorted){
      const inrNum = parseFloat(v.inr);
      const low = parseFloat(p.targetLow), high = parseFloat(p.targetHigh);
      const inRange = !isNaN(inrNum) && inrNum>=low && inrNum<=high;
      const factorsHtml = (v.factors||[]).map(f => '<span class="tag">'+escapeHtml(f==="Others"&&v.othersText?v.othersText:f)+'</span>').join("");
      const admitHtml = v.admitDate ? (escapeHtml(v.admitDate)+(v.admitDx?' &mdash; '+escapeHtml(v.admitDx):'')) : '<span style="color:var(--ink-soft);">&mdash;</span>';
      rows += '<tr>'+
        '<td>'+escapeHtml(v.date)+'</td>'+
        '<td><span class="badge '+(inRange?'badge-good':'badge-bad')+'">'+(v.inr||'--')+'</span><br><span style="font-size:11px; color:var(--ink-soft);">TWD '+(v.twd||'--')+'mg</span></td>'+
        '<td>'+(factorsHtml||'<span style="color:var(--ink-soft);">&mdash;</span>')+'</td>'+
        '<td>'+admitHtml+'</td>'+
        '<td>'+escapeHtml(planLabel(v))+'<br><span style="font-size:11px; color:var(--ink-soft);">New TWD '+(v.newTwd||'--')+'mg</span></td>'+
        '<td>'+(v.nextAppt||'<span style="color:var(--ink-soft);">&mdash;</span>')+'</td>'+
      '</tr>';
    }
  }

  el.innerHTML = ttrSummary+'<div class="card"><h3>Review history</h3><table class="history"><thead><tr><th>Date</th><th>INR / TWD</th><th>Factors</th><th>Ward admission</th><th>Plan</th><th>Next appt</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ---------- Settings view ----------
let rulesDraft = null;

async function renderSettingsView(){
  const main = document.getElementById("main");
  if(!configOk){ main.innerHTML = configWarningHtml(); return; }
  const rules = await getRules();
  rulesDraft = JSON.parse(JSON.stringify(rules));

  main.innerHTML =
    '<div class="patient-header"><div><h1>Dosing rules</h1><div class="meta">Used for the instant rule-based suggestion across all patients</div></div></div>'+
    '<div class="card"><h3>If INR is below target range</h3>'+
      '<p class="hint" style="margin-bottom:12px;">Tiers are checked from smallest to largest deviation. "Up to" means: if the INR is this much or less below the target low, use this tier.</p>'+
      '<div id="belowRows"></div>'+
      '<button class="btn" onclick="addTier(\'below\')">+ Add tier</button>'+
    '</div>'+
    '<div class="card"><h3>If INR is above target range</h3>'+
      '<p class="hint" style="margin-bottom:12px;">Same idea, for INR above the target high. You can also specify a withhold period before resuming at the reduced dose.</p>'+
      '<div id="aboveRows"></div>'+
      '<button class="btn" onclick="addTier(\'above\')">+ Add tier</button>'+
    '</div>'+
    '<div class="row-actions"><button class="btn btn-primary" onclick="saveRulesClick()">Save rules</button></div>';

  renderTierRows();
}

function belowRowHtml(t,i){
  return '<div class="grid" style="grid-template-columns:1.1fr 1.1fr 2fr auto; gap:10px; margin-bottom:10px; align-items:end;">'+
    '<div class="field"><label>Up to (INR below target)</label><input type="number" step="0.1" value="'+t.maxDeficit+'" oninput="updateTier(\'below\','+i+',\'maxDeficit\',this.value)"></div>'+
    '<div class="field"><label>Increase TWD by (%)</label><input type="number" step="1" value="'+t.increasePct+'" oninput="updateTier(\'below\','+i+',\'increasePct\',this.value)"></div>'+
    '<div class="field"><label>Note shown to user</label><input value="'+escapeHtml(t.note||'')+'" oninput="updateTier(\'below\','+i+',\'note\',this.value)"></div>'+
    '<button class="btn btn-danger" style="padding:9px 12px;" onclick="removeTier(\'below\','+i+')">Remove</button>'+
  '</div>';
}
function aboveRowHtml(t,i){
  return '<div class="grid" style="grid-template-columns:1fr 1fr 0.8fr 2fr auto; gap:10px; margin-bottom:10px; align-items:end;">'+
    '<div class="field"><label>Up to (INR above target)</label><input type="number" step="0.1" value="'+t.maxExcess+'" oninput="updateTier(\'above\','+i+',\'maxExcess\',this.value)"></div>'+
    '<div class="field"><label>Reduce TWD by (%)</label><input type="number" step="1" value="'+t.reducePct+'" oninput="updateTier(\'above\','+i+',\'reducePct\',this.value)"></div>'+
    '<div class="field"><label>Withhold (days)</label><input type="number" step="1" value="'+(t.withholdDays||0)+'" oninput="updateTier(\'above\','+i+',\'withholdDays\',this.value)"></div>'+
    '<div class="field"><label>Note shown to user</label><input value="'+escapeHtml(t.note||'')+'" oninput="updateTier(\'above\','+i+',\'note\',this.value)"></div>'+
    '<button class="btn btn-danger" style="padding:9px 12px;" onclick="removeTier(\'above\','+i+')">Remove</button>'+
  '</div>';
}
function renderTierRows(){
  document.getElementById("belowRows").innerHTML = rulesDraft.below.map(belowRowHtml).join("") || '<div class="empty-state">No tiers yet — add one below.</div>';
  document.getElementById("aboveRows").innerHTML = rulesDraft.above.map(aboveRowHtml).join("") || '<div class="empty-state">No tiers yet — add one below.</div>';
}
function updateTier(group, idx, key, value){
  rulesDraft[group][idx][key] = (key === "note") ? value : parseFloat(value);
}
function addTier(group){
  if(group === "below") rulesDraft.below.push({maxDeficit:1, increasePct:10, note:""});
  else rulesDraft.above.push({maxExcess:1, reducePct:10, withholdDays:0, note:""});
  renderTierRows();
}
function removeTier(group, idx){
  rulesDraft[group].splice(idx,1);
  renderTierRows();
}

async function saveRulesClick(){
  rulesDraft.below.sort((a,b) => a.maxDeficit - b.maxDeficit);
  rulesDraft.above.sort((a,b) => a.maxExcess - b.maxExcess);
  await saveRulesRow(rulesDraft);
  rulesCache = rulesDraft;
  renderTierRows();
  alert("Dosing rules saved.");
}

// ---------- init ----------
async function init(){
  initSupabase();
  if(!configOk){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appRoot").style.display = "flex";
    await renderMain();
    return;
  }
  const {data} = await sb.auth.getSession();
  if(data.session){
    currentSession = data.session;
    await onAuthed();
  } else {
    showLoginScreen();
  }
  sb.auth.onAuthStateChange((event, session) => {
    if(event === "SIGNED_OUT"){
      currentSession = null;
      showLoginScreen();
    }
  });
}
init();
</script>
