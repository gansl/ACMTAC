<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INR Clinic Tracker</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#16243C; --ink-soft:#3A4A63; --paper:#F6F4EE; --card:#FFFFFF; --line:#DCD7C9;
    --accent:#8C2F26; --accent-soft:#F3E3DF; --good:#1E6B4E; --good-soft:#E2F0E9;
    --warn:#A8631B; --warn-soft:#F7E9D6; --mono:'JetBrains Mono','Courier New',monospace;
    --serif:'Source Serif 4', Georgia, serif; --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:var(--sans); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .app{display:flex; min-height:100vh;}
  .sidebar{width:300px; flex-shrink:0; background:var(--ink); color:#F1EEE5; display:flex; flex-direction:column; padding:20px 16px;}
  .brand{font-family:var(--serif); font-size:21px; margin:0 0 2px 4px;}
  .brand span{color:#D98A7E;}
  .brand-sub{font-size:11px; color:#9AA6BC; margin:0 0 18px 4px; text-transform:uppercase; letter-spacing:1.2px;}
  .nav-switch{display:flex; gap:6px; margin-bottom:14px;}
  .nav-btn{flex:1; padding:8px; border-radius:7px; border:1px solid #2C3C57; background:#1E2E48; color:#C7D0E0; font-size:12px; font-weight:600; cursor:pointer; text-align:center;}
  .nav-btn.active{background:var(--accent); border-color:#5C3A33; color:#fff;}
  .search{width:100%; padding:9px 12px; border-radius:8px; border:1px solid #2C3C57; background:#1E2E48; color:#F1EEE5; font-size:13px; margin-bottom:12px;}
  .search::placeholder{color:#7E8BA3;}
  .btn-add{width:100%; padding:10px; border-radius:8px; border:1px solid #5C3A33; background:var(--accent); color:#fff; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:16px;}
  .btn-add:hover{background:#762620;}
  .patient-list{flex:1; overflow-y:auto;}
  .patient-row{padding:11px 10px; border-radius:8px; cursor:pointer; margin-bottom:4px; border:1px solid transparent;}
  .patient-row:hover{background:#1E2E48;}
  .patient-row.active{background:#243958; border-color:#3A5378;}
  .patient-row .pname{font-size:14px; font-weight:600; color:#F1EEE5;}
  .patient-row .pmrn{font-size:11px; color:#8C99B2; font-family:var(--mono);}
  .ttr-pill{display:inline-block; font-family:var(--mono); font-size:11px; font-weight:700; padding:2px 7px; border-radius:20px; margin-top:5px;}
  .ttr-good{background:#163A2E; color:#79D9A8;}
  .ttr-bad{background:#3C1C1A; color:#E89189;}
  .ttr-none{background:#26344A; color:#8C99B2;}
  .empty-list{color:#7E8BA3; font-size:13px; padding:12px 4px; line-height:1.5;}
  .main{flex:1; padding:32px 40px; max-width:980px;}
  .placeholder{display:flex; flex-direction:column; align-items:flex-start; justify-content:center; height:70vh; color:var(--ink-soft);}
  .placeholder h1{font-family:var(--serif); font-size:30px; margin:0 0 8px;}
  .placeholder p{font-size:14px; max-width:460px; line-height:1.6;}
  .patient-header{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:22px;}
  .patient-header h1{font-family:var(--serif); font-size:28px; margin:0 0 4px;}
  .patient-header .meta{font-size:13px; color:var(--ink-soft); font-family:var(--mono);}
  .header-stats{display:flex; gap:14px;}
  .stat-box{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 16px; text-align:center; min-width:90px;}
  .stat-box .label{font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-soft);}
  .stat-box .value{font-family:var(--mono); font-size:22px; font-weight:700; margin-top:2px;}
  .stat-box.alert{border-color:var(--accent); background:var(--accent-soft);}
  .stat-box.alert .value{color:var(--accent);}
  .stat-box.ok .value{color:var(--good);}
  .alert-banner{background:var(--accent-soft); border:1px solid #D9B3AC; color:var(--accent); border-radius:10px; padding:12px 16px; font-size:13px; margin-bottom:20px; display:flex; gap:10px; align-items:flex-start; line-height:1.5;}
  .tabs{display:flex; gap:4px; margin-bottom:22px; border-bottom:1px solid var(--line);}
  .tab{padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-1px;}
  .tab.active{color:var(--ink); border-bottom-color:var(--accent);}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px 24px; margin-bottom:18px;}
  .card h3{font-size:14px; margin:0 0 14px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-soft);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:12px; font-weight:600; color:var(--ink-soft);}
  .field input, .field select, .field textarea{padding:9px 10px; border-radius:7px; border:1px solid var(--line); font-size:13.5px; background:#FCFBF7; color:var(--ink); font-family:var(--sans);}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent);}
  .checklist{display:flex; flex-direction:column; gap:7px;}
  .checklist label{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:400; color:var(--ink); cursor:pointer;}
  .factor-row{padding:6px 0; border-bottom:1px solid #F0EEE4;}
  .factor-row:last-child{border-bottom:none;}
  .factor-note{padding:7px 9px; border-radius:6px; border:1px solid var(--line); font-size:12.5px; background:#FCFBF7; font-family:var(--sans);}
  .span2{grid-column:span 2;}
  .row-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:8px;}
  .btn{padding:9px 18px; border-radius:7px; border:1px solid var(--line); background:#FCFBF7; font-size:13px; font-weight:600; cursor:pointer; color:var(--ink);}
  .btn:hover{background:#F0EEE4;}
  .btn-primary{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn-primary:hover{background:#0E1A2C;}
  .btn-danger{color:var(--accent); border-color:#D9B3AC; background:var(--accent-soft);}
  table.history{width:100%; border-collapse:collapse; font-size:13px;}
  table.history th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line);}
  table.history td{padding:9px 10px; border-bottom:1px solid #EEEAE0; vertical-align:top;}
  table.history tr:last-child td{border-bottom:none;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; font-family:var(--mono);}
  .badge-good{background:var(--good-soft); color:var(--good);}
  .badge-bad{background:var(--accent-soft); color:var(--accent);}
  .tag{display:inline-block; font-size:11px; background:#EFEAE0; color:var(--ink-soft); padding:2px 7px; border-radius:5px; margin:2px 3px 0 0;}
  .empty-state{color:var(--ink-soft); font-size:13px; padding:20px 4px; line-height:1.6;}
  .hint{font-size:11.5px; color:var(--ink-soft); margin-top:4px;}
  .modal-bg{position:fixed; inset:0; background:rgba(22,36,60,0.45); display:none; align-items:center; justify-content:center; z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:var(--card); border-radius:12px; padding:24px 28px; width:380px; max-width:90vw;}
  .modal h3{margin:0 0 14px; font-family:var(--serif); font-size:19px;}
  .suggestion-box{background:var(--good-soft); border:1px solid #BBD9CB; border-radius:9px; padding:12px 14px; font-size:13px; line-height:1.6; color:var(--good); margin-top:12px;}
  .config-warning{background:var(--warn-soft); border:1px solid #E0BC8C; color:var(--warn); border-radius:10px; padding:14px 18px; font-size:13px; line-height:1.6; margin-bottom:20px;}
  /* TTR overview */
  .ttr-overview-header{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:22px;}
  .ttr-avg-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px 24px; min-width:140px; text-align:center;}
  .ttr-avg-box .av-label{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-soft);}
  .ttr-avg-box .av-value{font-family:var(--mono); font-size:34px; font-weight:700; margin:4px 0 0;}
  .ttr-avg-box.good .av-value{color:var(--good);}
  .ttr-avg-box.bad .av-value{color:var(--accent);}
  .ttr-count-box{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 18px; min-width:110px; text-align:center;}
  .ttr-count-box .cv-label{font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--ink-soft);}
  .ttr-count-box .cv-value{font-family:var(--mono); font-size:22px; font-weight:700; color:var(--ink);}
  .status-badge{display:inline-block; font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:20px; margin-left:5px;}
  .sb-active{background:var(--good-soft); color:var(--good);}
  .sb-inactive{background:#EFEAE0; color:#6B7A8C;}
  .sb-excluded{background:var(--warn-soft); color:var(--warn);}
  table.ttr-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.ttr-table th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft); padding:8px 10px; border-bottom:1px solid var(--line);}
  table.ttr-table td{padding:10px 10px; border-bottom:1px solid #EEEAE0; vertical-align:middle;}
  table.ttr-table tr:last-child td{border-bottom:none;}
  .toggle-btn{padding:5px 11px; border-radius:20px; border:1px solid var(--line); background:#FCFBF7; font-size:11.5px; font-weight:600; cursor:pointer;}
  .toggle-btn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  /* Regime suggestion */
  .regime-card{border:1px solid var(--line); border-radius:9px; padding:12px 14px; margin-bottom:8px; background:#FCFBF7; cursor:pointer; transition:border-color 0.15s;}
  .regime-card:hover{border-color:#A8B8CC;}
  .regime-card.selected{border-color:var(--accent); background:var(--accent-soft);}
  .regime-twd{font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin-top:3px;}
  .regime-label{font-size:13px; font-weight:600; color:var(--ink);}
  .regime-section{background:#F3F5F8; border:1px solid #D8DDE8; border-radius:10px; padding:14px 16px; margin-top:10px;}
  .login-screen{display:flex; align-items:center; justify-content:center; min-height:100vh; width:100%; background:var(--paper);}
  .login-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:36px 34px; width:340px; max-width:90vw;}
  .login-card .brand{color:var(--ink); margin-bottom:4px;}
  .login-card .brand-sub{color:var(--ink-soft); margin-bottom:22px;}
  .login-error{color:var(--accent); font-size:12.5px; margin-top:8px; min-height:16px;}
  .logout-row{display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:14px; border-top:1px solid #2C3C57;}
  .logout-row span{font-size:12px; color:#9AA6BC; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:170px;}
  .logout-link{font-size:12px; color:#D98A7E; cursor:pointer; font-weight:600;}
  /* Toast notifications */
  .toast-container{position:fixed; bottom:24px; right:24px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:360px;}
  .toast{padding:12px 16px; border-radius:9px; font-size:13px; font-weight:500; line-height:1.4; animation:slideIn 0.2s ease; box-shadow:0 4px 16px rgba(0,0,0,0.15);}
  @keyframes slideIn{from{transform:translateX(40px); opacity:0;} to{transform:translateX(0); opacity:1;}}
  .toast.success{background:var(--good); color:#fff;}
  .toast.error{background:var(--accent); color:#fff;}
  .toast.info{background:var(--ink); color:#F1EEE5;}
  /* DB status dot */
  .db-dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; flex-shrink:0;}
  .db-dot.ok{background:#79D9A8;}
  .db-dot.err{background:#E89189;}
  .db-dot.pending{background:#F0C96B;}
  .db-status{display:flex; align-items:center; font-size:11px; color:#8C99B2; margin-bottom:10px;}
  /* Defaulters */
  .defaulter-row{display:grid; grid-template-columns:1.6fr 1fr 1fr auto; gap:10px; align-items:start; padding:12px 0; border-bottom:1px solid #EEEAE0;}
  .defaulter-row:last-child{border-bottom:none;}
  .overdue-badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; font-family:var(--mono);}
  .overdue-hi{background:#F3E3DF; color:var(--accent);}
  .overdue-mid{background:#F7E9D6; color:var(--warn);}
  .overdue-lo{background:#EFEAE0; color:#6B7A8C;}
</style>
</head>
<body>

<div class="app" id="appRoot" style="display:none;">
  <div class="sidebar">
    <p class="brand">INR<span>Clinic</span></p>
    <p class="brand-sub">Anticoagulation tracker</p>
    <div class="nav-switch" style="flex-wrap:wrap; gap:5px;">
      <div class="nav-btn active" id="navPatients" onclick="switchView('patients')" style="flex:1 1 70px;">Patients</div>
      <div class="nav-btn" id="navTTR" onclick="switchView('ttr')" style="flex:1 1 50px;">TTR</div>
      <div class="nav-btn" id="navDefaulters" onclick="switchView('defaulters')" style="flex:1 1 70px;">Defaulters</div>
      <div class="nav-btn" id="navSettings" onclick="switchView('settings')" style="flex:1 1 80px;">Dosing rules</div>
    </div>
    <div class="db-status" id="dbStatus"><span class="db-dot pending" id="dbDot"></span><span id="dbStatusText">Checking…</span></div>
    <input class="search" id="searchBox" placeholder="Search name or MRN" oninput="renderPatientList()">
    <button class="btn-add" onclick="openNewPatientModal()">+ Add patient</button>
    <div style="display:flex; gap:6px; margin-bottom:16px;">
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="document.getElementById('csvFile').click()">Import CSV</button>
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="downloadCsvTemplate()">Template</button>
    </div>
    <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCsvImport(event)">
    <div style="display:flex; gap:6px; margin-bottom:16px;">
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="exportData()">Export data</button>
      <button class="btn" style="flex:1; font-size:11.5px; padding:8px; background:#1E2E48; border-color:#2C3C57; color:#F1EEE5;" onclick="document.getElementById('jsonFile').click()">Import data</button>
    </div>
    <input type="file" id="jsonFile" accept=".json" style="display:none" onchange="handleJsonImport(event)">
    <div class="patient-list" id="patientList"></div>
    <div class="logout-row">
      <span id="sessionEmail"></span>
      <span class="logout-link" onclick="logout()">Sign out</span>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <p class="brand">INR<span style="color:var(--accent);">Clinic</span></p>
    <p class="brand-sub" style="text-transform:uppercase; letter-spacing:1.2px; font-size:11px;">Sign in to continue</p>
    <div class="field" style="margin-bottom:10px;"><label>Email</label><input id="login_email" type="email" placeholder="you@clinic.org"></div>
    <div class="field" style="margin-bottom:6px;"><label>Password</label><input id="login_password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"></div>
    <div class="login-error" id="loginError"></div>
    <div class="row-actions" style="margin-top:10px;"><button class="btn btn-primary" style="width:100%;" id="loginBtn" onclick="login()">Sign in</button></div>
    <p class="hint" style="margin-top:14px;">Access is by invitation only. Ask your administrator to add your email in Supabase &gt; Authentication &gt; Users.</p>
  </div>
</div>

<div class="modal-bg" id="newPatientModal">
  <div class="modal">
    <h3>New patient</h3>
    <div class="field" style="margin-bottom:10px;"><label>Full name</label><input id="np_name" placeholder="e.g. Tan Mei Ling"></div>
    <div class="field" style="margin-bottom:10px;"><label>MRN</label><input id="np_mrn" placeholder="e.g. A1234567"></div>
    <div class="row-actions">
      <button class="btn" onclick="closeNewPatientModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createPatient()">Create</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const FACTOR_OPTIONS = [
  "No significant factor detected",
  "Diet changes","Non-compliance to regime","Drug / supplement interaction",
  "Changes in medical condition","Changes in lifestyle (alcohol/smoking)",
  "Changes in physical activities","Others"
];

const DEFAULT_RULES = {
  tabletStrengths: [1, 2, 3, 5],
  below: [
    {maxDeficit:0.5, increasePct:10, note:"Increase weekly dose by 10%."},
    {maxDeficit:999, increasePct:20, note:"Give a stat dose (double the new daily dose), then increase weekly dose by 20%."}
  ],
  above: [
    {maxExcess:0.09, reducePct:0, withholdDays:0, note:"No change. Within acceptable buffer above target."},
    {maxExcess:0.59, reducePct:0, withholdDays:0, note:"No change. Recheck INR in 1 week; if persistently elevated, decrease weekly dose by 5-10%."},
    {maxExcess:1.09, reducePct:10, withholdDays:1, note:"Omit 1 dose, then decrease weekly dose by 10%."},
    {maxExcess:2.0, reducePct:10, withholdDays:2, note:"Omit 2 doses, then decrease weekly dose by 10%."},
    {maxExcess:999, reducePct:0, withholdDays:0, note:"INR critically high — refer to doctor immediately. Do not adjust dose without medical review."}
  ]
};

let sb = null;
let configOk = false;
let patients = [];
let visitsCache = {};
let rulesCache = null;
let currentPatientId = null;
let currentTab = "profile";
let currentView = "patients";
let currentSession = null;

function initSupabase(){
  const cfg = window.APP_CONFIG || {};
  if(!cfg.SUPABASE_URL || cfg.SUPABASE_URL.includes("YOUR-PROJECT") || !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_ANON_KEY.includes("YOUR-ANON")){
    configOk = false;
    return;
  }
  sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  configOk = true;
}

// ---------- auth ----------
async function login(){
  const email = document.getElementById("login_email").value.trim();
  const password = document.getElementById("login_password").value;
  const errBox = document.getElementById("loginError");
  const btn = document.getElementById("loginBtn");
  errBox.innerText = "";
  if(!email || !password){ errBox.innerText = "Enter your email and password."; return; }
  btn.disabled = true; btn.innerText = "Signing in...";
  const {data, error} = await sb.auth.signInWithPassword({email, password});
  btn.disabled = false; btn.innerText = "Sign in";
  if(error){ errBox.innerText = error.message; return; }
  currentSession = data.session;
  await onAuthed();
}
async function logout(){
  await sb.auth.signOut();
  currentSession = null;
  showLoginScreen();
}
function showLoginScreen(){
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appRoot").style.display = "none";
}
async function onAuthed(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appRoot").style.display = "flex";
  document.getElementById("sessionEmail").innerText = currentSession?.user?.email || "";
  await checkDbConnection();
  patients = await fetchPatients();
  await renderPatientList();
  await renderMain();
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.innerText = s == null ? "" : s;
  return d.innerHTML;
}

function showToast(msg, type='info', duration=4000){
  const container = document.getElementById("toastContainer");
  if(!container) return;
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.innerText = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

function setDbStatus(ok, msg){
  const dot = document.getElementById("dbDot");
  const text = document.getElementById("dbStatusText");
  if(!dot||!text) return;
  dot.className = "db-dot " + (ok===null?"pending":(ok?"ok":"err"));
  text.innerText = msg;
}

// ---------- data layer ----------
function rowToPatient(r){
  return {id:r.id, name:r.name, mrn:r.mrn, phone:r.phone||"", indication:r.indication||"", targetLow:r.target_low, targetHigh:r.target_high, duration:r.duration||"", isActive:r.is_active!==false, ttrExcluded:r.ttr_excluded||false, ttrExcludeReason:r.ttr_exclude_reason||""};
}
function patientToRow(p){
  return {id:p.id, name:p.name, mrn:p.mrn, phone:p.phone, indication:p.indication, target_low:p.targetLow, target_high:p.targetHigh, duration:p.duration, is_active:p.isActive!==false, ttr_excluded:p.ttrExcluded||false, ttr_exclude_reason:p.ttrExcludeReason||""};
}
function rowToVisit(r){

// ---------- Rosendaal TTR ----------
function inRangeDuration(inr1, inr2, days, low, high){
  if(days <= 0) return 0;
  if(inr1 === inr2) return (inr1 >= low && inr1 <= high) ? days : 0;
  const slope = (inr2 - inr1) / days;
  let tLow = (low - inr1) / slope, tHigh = (high - inr1) / slope;
  let lo = Math.max(Math.min(tLow,tHigh), 0);
  let hi = Math.min(Math.max(tLow,tHigh), days);
  return hi < lo ? 0 : hi - lo;
}
function calcTTR(visits, low, high){
  const dated = visits.filter(v => v.date && v.inr !== "" && v.inr !== null && !isNaN(v.inr))
    .map(v => ({date:new Date(v.date), inr:parseFloat(v.inr)})).sort((a,b)=>a.date-b.date);
  if(dated.length < 2) return null;
  let totalDays=0, inRangeDays=0;
  for(let i=1;i<dated.length;i++){
    const days = (dated[i].date - dated[i-1].date) / 86400000;
    if(days<=0) continue;
    totalDays += days;
    inRangeDays += inRangeDuration(dated[i-1].inr, dated[i].inr, days, low, high);
  }
  return totalDays === 0 ? null : (inRangeDays/totalDays)*100;
}
function calcExtendedTTR(visits, low, high){
  return calcTTR(visits, low - 0.2, high + 0.2);
}

// ---------- Rule-based dosing suggestion ----------
// Rule 1: max change of daily dose is +/-1mg (i.e. max weekly TWD change of 7mg).
// Rule 2: 1% change in warfarin dose corresponds to ~0.1 change in INR (used only as a sanity cross-check note).
// Rule 3: withholding 1 day of warfarin is expected to drop INR by about 0.3-0.5.
function suggestNewTwd(currentTwd, pct, direction){
  const twd = parseFloat(currentTwd);
  if(isNaN(twd) || twd <= 0 || !pct) return null;
  const maxWeeklyChange = 7; // Rule 1: +/-1mg/day cap
  let change = twd * (pct/100);
  const capped = change > maxWeeklyChange;
  if(capped) change = maxWeeklyChange;
  const newTwd = Math.round((twd + direction*change) * 10) / 10;
  return {newTwd, capped};
}

function getRuleSuggestion(inr, low, high, rules, currentTwd){
  if(isNaN(inr)) return null;
  if(inr >= low && inr <= high) return {text:"INR is within target range. Continue current dose.", tone:"good"};

  if(inr < low){
    const deficit = low - inr;
    const tier = rules.below.find(t => deficit <= t.maxDeficit) || rules.below[rules.below.length-1];
    let text = `Increase total weekly dose by approximately ${tier.increasePct}%. ${tier.note}`;
    const sug = suggestNewTwd(currentTwd, tier.increasePct, 1);
    if(sug) text += ` Suggested new TWD: ~${sug.newTwd}mg/week${sug.capped ? " (capped at the ±1mg/day maximum daily change)" : ""}.`;
    return {text, tone:"warn"};
  }

  const excess = inr - high;
  const tier = rules.above.find(t => excess <= t.maxExcess) || rules.above[rules.above.length-1];
  let text = tier.reducePct ? `Reduce total weekly dose by approximately ${tier.reducePct}%.` : "No dose reduction at this level.";
  if(tier.withholdDays) text += ` Withhold dose for ${tier.withholdDays} day(s) first (each day withheld is expected to lower INR by roughly 0.3-0.5).`;
  text += ` ${tier.note}`;
  if(tier.reducePct){
    const sug = suggestNewTwd(currentTwd, tier.reducePct, -1);
    if(sug) text += ` Suggested new TWD: ~${sug.newTwd}mg/week${sug.capped ? " (capped at the ±1mg/day maximum daily change)" : ""}.`;
  }
  return {text, tone:"warn"};
}

async function renderPatientList(){

  const q = document.getElementById("searchBox").value.toLowerCase();
  const filtered = patients.filter(p => p.name.toLowerCase().includes(q) || p.mrn.toLowerCase().includes(q));

async function handleJsonImport(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!configOk){ alert("Connect Supabase first."); event.target.value=""; return; }
  if(!confirm("This will add or update patients and reviews from the backup file into the current database. Continue?")){ event.target.value=""; return; }

  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    let patientsCount = 0, visitsCount = 0;

    for(const p of (payload.patients||[])){
      await upsertPatientRow(p);
      patientsCount++;
    }
    for(const pid of Object.keys(payload.visitsByPatient || {})){
      for(const v of payload.visitsByPatient[pid]){
        await upsertVisitRow(pid, v);
        visitsCount++;
      }
    }
    if(payload.dosingRules){
      await saveRulesRow(payload.dosingRules);
      rulesCache = payload.dosingRules;
    }

    visitsCache = {};
    patients = await fetchPatients();
    event.target.value = "";
    await renderPatientList();
    await renderMain();
    alert("Import complete: "+patientsCount+" patient(s), "+visitsCount+" review(s) restored.");
  }catch(e){
    event.target.value = "";
    alert("Could not read that backup file: "+e.message);
  }
}

function getField(row, ...keys){
  for(const k of keys){
    for(const rk of Object.keys(row)){
      if(rk.trim().toLowerCase() === k.toLowerCase()) return (row[rk]||"").toString().trim();
    }
  }
  return "";
}

async function handleCsvImport(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!configOk){ alert("Connect Supabase first (see config.js) before importing patients."); event.target.value=""; return; }

  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: async (results) => {
      let imported = 0, skipped = 0;
      for(const row of results.data){
        const name = getField(row, "name");
        const mrn = getField(row, "mrn");
        if(!name || !mrn){ skipped++; continue; }
        const id = "p_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
        const targetLow = parseFloat(getField(row,"target_low","targetLow","target low")) || 2;
        const targetHigh = parseFloat(getField(row,"target_high","targetHigh","target high")) || 3;
        const patient = {
          id, name, mrn,
          phone: getField(row,"phone"),
          indication: getField(row,"indication"),
          targetLow, targetHigh,
          duration: getField(row,"duration"),
          isActive: true, ttrExcluded: false, ttrExcludeReason: ""
        };
        patients.push(patient);
        await upsertPatientRow(patient, true);
        visitsCache[id] = [];
        imported++;
      }
      event.target.value = "";
      await renderPatientList();
      alert("Imported "+imported+" patient(s)."+(skipped ? " Skipped "+skipped+" row(s) missing name or MRN." : ""));
    },
    error: (err) => {
      event.target.value = "";
      alert("Could not read that CSV file: "+err.message);
    }
  });
}

// ---------- Main render ----------
async function renderMain(){
  const main = document.getElementById("main");
  if(!configOk){
    main.innerHTML = configWarningHtml();
    return;
  }
  if(!currentPatientId){
    main.innerHTML = '<div class="placeholder"><h1>Select or add a patient</h1><p>Track INR reviews, dosing decisions and ward admissions per patient. TTR is calculated automatically with the Rosendaal method, and patients below 60% are flagged. Use "Dosing rules" in the sidebar to tune the suggestion thresholds.</p></div>';
    return;
  }
  const p = patients.find(x => x.id === currentPatientId);
  const visits = await loadVisits(currentPatientId);
  const low = parseFloat(p.targetLow), high = parseFloat(p.targetHigh);
  const ttr = calcTTR(visits, low, high);
  const extTTR = calcExtendedTTR(visits, low, high);
  const lastVisit = visits.slice().filter(v=>v.date).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

  let alertHtml = "";
  if(ttr !== null && ttr < 60){
    alertHtml = '<div class="alert-banner"><span>&#9888;</span><div><b>Low TTR alert.</b> Time-in-therapeutic-range is '+ttr.toFixed(0)+'%, below the 60% quality threshold. Review dosing, compliance, and contributing factors at the next visit.</div></div>';
  }

  main.innerHTML =
    '<div class="patient-header">'+
      '<div><h1>'+escapeHtml(p.name)+'</h1><div class="meta">MRN '+escapeHtml(p.mrn)+(p.indication?' &middot; '+escapeHtml(p.indication):'')+'</div></div>'+
      '<div class="header-stats">'+
        '<div class="stat-box '+(ttr===null?'':(ttr<60?'alert':'ok'))+'"><div class="label">TTR</div><div class="value">'+(ttr===null?'--':ttr.toFixed(0)+'%')+'</div></div>'+
        '<div class="stat-box" title="Extended TTR: target range expanded ±0.2"><div class="label">Ext. TTR ±0.2</div><div class="value" style="font-size:18px;">'+(extTTR===null?'--':extTTR.toFixed(0)+'%')+'</div></div>'+
        '<div class="stat-box"><div class="label">Target INR</div><div class="value">'+(p.targetLow??'--')+'&ndash;'+(p.targetHigh??'--')+'</div></div>'+
        '<div class="stat-box"><div class="label">Last INR</div><div class="value">'+(lastVisit?lastVisit.inr:'--')+'</div></div>'+
      '</div>'+
    '</div>'+
    alertHtml+
    '<div class="tabs">'+tabBtn('profile','Patient info')+tabBtn('review','New review')+tabBtn('history','History & TTR')+'</div>'+
    '<div id="panelProfile" class="panel"></div>'+
    '<div id="panelReview" class="panel"></div>'+
    '<div id="panelHistory" class="panel"></div>';

  renderProfilePanel(p);
  await renderReviewPanel(p);
  renderHistoryPanel(p, visits, ttr, extTTR);
  showTab(currentTab);
}

async function saveReview(){
  const date = document.getElementById("rv_date").value;
  if(!date){ alert("Enter a review date."); return; }

  const factors = [];
  const factorNotes = {};
  document.querySelectorAll(".factor-check").forEach(cb => {
    if(cb.checked){
      factors.push(cb.value);
      const noteEl = document.getElementById("factor_note_"+cb.dataset.idx);
      if(noteEl && noteEl.value.trim()) factorNotes[cb.value] = noteEl.value.trim();
    }
  });

  const ruleBox = document.querySelector("#ruleSuggestionBox .suggestion-box");
  const planAction = document.getElementById("rv_plan_action").value;
  let planDays = "", planLoadMg = "", planSubAction = "", planSubPct = "";
  if(planAction === "load"){
    planLoadMg = document.getElementById("rv_load_mg").value;
    planDays = document.getElementById("rv_load_days").value;
    planSubAction = document.getElementById("rv_load_then").value;
    planSubPct = planSubAction === "increase" ? document.getElementById("rv_load_pct").value : "";
  } else if(planAction === "withhold"){
    planDays = document.getElementById("rv_withhold_days").value;
    planSubAction = document.getElementById("rv_withhold_then").value;
    planSubPct = planSubAction === "reduce" ? document.getElementById("rv_withhold_pct").value : "";
  }

  const visit = {
    id:"v_"+Date.now(), date,
    twd: document.getElementById("rv_twd").value,
    inr: document.getElementById("rv_inr").value,
    factors, factorNotes,
    admitDate: document.getElementById("rv_admit_date").value,
    admitDx: document.getElementById("rv_admit_dx").value.trim(),
    planAction, planDays, planLoadMg, planSubAction, planSubPct,
    newTwd: document.getElementById("rv_new_twd").value,
    nextAppt: document.getElementById("rv_next_appt").value,
    clinicalNote: ruleBox ? ruleBox.innerText.replace("Rule-based suggestion: ","") : "",
    regimeLabel: selectedRegimeLabel || ""
  };

  await insertVisitRow(currentPatientId, visit);
  const visits = await loadVisits(currentPatientId);
  visits.push(visit);
  visitsCache[currentPatientId] = visits;
  await renderPatientList();
  await renderMain();
  showTab("history");
}

// ---------- History panel ----------
function planLabel(v){
  if(v.planAction === "continue") return "Continue dose";
  if(v.planAction === "refer_mopd") return "Refer MOPD";
  if(v.planAction === "load"){
    const then = v.planSubAction === "increase" ? `then increase TWD by ${v.planSubPct||"?"}%` : "then continue dose";
    return `Load dose ${v.planLoadMg||"?"}mg for ${v.planDays||"?"}d, ${then}`;
  }
  if(v.planAction === "withhold"){
    const then = v.planSubAction === "reduce" ? `then reduce TWD by ${v.planSubPct||"?"}%` : "then continue dose";
    return `Withhold ${v.planDays||"?"}d, ${then}`;
  }
  return v.planAction || "--";
}
function renderHistoryPanel(p, visits, ttr, extTTR){
  const el = document.getElementById("panelHistory");
  const sorted = visits.slice().sort((a,b) => new Date(b.date)-new Date(a.date));

  let ttrSummary = '<div class="card"><h3>Time in therapeutic range</h3>';
  if(ttr === null){
    ttrSummary += '<div class="empty-state">Need at least two dated INR readings to calculate TTR (Rosendaal method).</div>';
  } else {
    const cls = ttr<60 ? 'badge-bad' : 'badge-good';
    const extCls = (extTTR!==null && extTTR<60) ? 'badge-bad' : 'badge-good';
    ttrSummary += '<div style="display:flex; gap:24px; flex-wrap:wrap; margin-bottom:10px;">'+
      '<div><div style="font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px;">TTR ('+p.targetLow+'–'+p.targetHigh+')</div><span class="badge '+cls+'" style="font-size:15px; padding:4px 12px;">'+ttr.toFixed(1)+'%</span></div>'+
      (extTTR!==null?'<div><div style="font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:4px;">Extended TTR ('+(parseFloat(p.targetLow)-0.2)+'–'+(parseFloat(p.targetHigh)+0.2)+')</div><span class="badge '+extCls+'" style="font-size:15px; padding:4px 12px;">'+extTTR.toFixed(1)+'%</span></div>':'')+
    '</div>'+
    (ttr<60 ? '<span style="color:var(--accent); font-size:13px;">Standard TTR below 60% quality threshold — flagged for review.</span>' : '<span style="color:var(--good); font-size:13px;">Standard TTR within acceptable control (≥60%).</span>');
  }
  ttrSummary += '</div>';

  let rows = "";
  if(sorted.length === 0){
    rows = '<tr><td colspan="6" class="empty-state">No reviews recorded yet. Add one under "New review".</td></tr>';
  } else {
    for(const v of sorted){
      const inrNum = parseFloat(v.inr);
      const low = parseFloat(p.targetLow), high = parseFloat(p.targetHigh);
      const inRange = !isNaN(inrNum) && inrNum>=low && inrNum<=high;
      const factorsHtml = (v.factors||[]).map(f => {
        const note = (v.factorNotes||{})[f];
        return '<span class="tag" title="'+escapeHtml(note||'')+'">'+escapeHtml(f)+(note?' — '+escapeHtml(note):'')+'</span>';
      }).join("");
      const admitHtml = v.admitDate ? (escapeHtml(v.admitDate)+(v.admitDx?' &mdash; '+escapeHtml(v.admitDx):'')) : '<span style="color:var(--ink-soft);">&mdash;</span>';
      rows += '<tr>'+
        '<td>'+escapeHtml(v.date)+'</td>'+
        '<td><span class="badge '+(inRange?'badge-good':'badge-bad')+'">'+(v.inr||'--')+'</span><br><span style="font-size:11px; color:var(--ink-soft);">TWD '+(v.twd||'--')+'mg</span></td>'+
        '<td>'+(factorsHtml||'<span style="color:var(--ink-soft);">&mdash;</span>')+'</td>'+
        '<td>'+admitHtml+'</td>'+
        '<td>'+escapeHtml(planLabel(v))+'<br><span style="font-size:11px; color:var(--ink-soft);">New TWD '+(v.newTwd||'--')+'mg</span>'+(v.regimeLabel?'<br><span style="font-size:11px; color:var(--ink-soft); font-style:italic;">'+escapeHtml(v.regimeLabel)+'</span>':'')+'</td>'+
        '<td>'+(v.nextAppt||'<span style="color:var(--ink-soft);">&mdash;</span>')+'</td>'+

  el.innerHTML = ttrSummary+'<div class="card"><h3>Review history</h3><table class="history"><thead><tr><th>Date</th><th>INR / TWD</th><th>Factors</th><th>Ward admission</th><th>Plan</th><th>Next appt</th></tr></thead><tbody>'+rows+'</tbody></table></div>';

// ---------- TTR Overview ----------
async function renderTTROverview(){
  const main = document.getElementById("main");
  if(!configOk){ main.innerHTML = configWarningHtml(); return; }

  const allPatients = patients;
  const ttrData = [];
  for(const p of allPatients){
    const visits = await loadVisits(p.id);
    const ttr = calcTTR(visits, parseFloat(p.targetLow), parseFloat(p.targetHigh));
    const extTTR = calcExtendedTTR(visits, parseFloat(p.targetLow), parseFloat(p.targetHigh));
    ttrData.push({p, ttr, extTTR});
  }

  const active = ttrData.filter(d => d.p.isActive !== false);
  const included = active.filter(d => !d.p.ttrExcluded && d.ttr !== null);
  const excluded = active.filter(d => d.p.ttrExcluded);
  const noData = active.filter(d => !d.p.ttrExcluded && d.ttr === null);

  const avgTTR = included.length > 0 ? included.reduce((s,d) => s+d.ttr, 0) / included.length : null;
  const avgExtTTR = included.filter(d=>d.extTTR!==null).length > 0
    ? included.filter(d=>d.extTTR!==null).reduce((s,d) => s+d.extTTR, 0) / included.filter(d=>d.extTTR!==null).length : null;
  const below60 = included.filter(d => d.ttr < 60).length;
  const avgClass = avgTTR === null ? '' : (avgTTR < 60 ? 'bad' : 'good');

  function ttrBadge(ttr){
    if(ttr===null) return '<span class="badge" style="background:#EFEAE0; color:#6B7A8C;">—</span>';
    return '<span class="badge '+(ttr<60?'badge-bad':'badge-good')+'">'+ttr.toFixed(1)+'%</span>';
  }
  function statusBadges(d){
    let s = '';
    if(d.p.isActive===false) s += '<span class="status-badge sb-inactive">Inactive</span>';
    if(d.p.ttrExcluded) s += '<span class="status-badge sb-excluded">Excluded</span>';
    return s;
  }

  const allRows = ttrData.sort((a,b) => {
    if(a.p.isActive===false && b.p.isActive!==false) return 1;
    if(b.p.isActive===false && a.p.isActive!==false) return -1;
    if(a.ttr===null) return 1;
    if(b.ttr===null) return -1;
    return a.ttr - b.ttr;
  }).map(d => `
    <tr style="${d.p.isActive===false?'opacity:0.55;':''}">
      <td><span style="font-weight:600;">${escapeHtml(d.p.name)}</span>${statusBadges(d)}</td>
      <td style="font-family:var(--mono); font-size:12px;">${escapeHtml(d.p.mrn)}</td>
      <td style="font-size:12px;">${escapeHtml(d.p.indication||'—')}</td>
      <td style="font-family:var(--mono); font-size:12px;">${d.p.targetLow}–${d.p.targetHigh}</td>
      <td>${ttrBadge(d.ttr)}</td>
      <td>${ttrBadge(d.extTTR)}</td>
      <td>
        <button class="toggle-btn ${d.p.isActive!==false?'on':''}" onclick="toggleActive('${d.p.id}')">${d.p.isActive!==false?'Active':'Inactive'}</button>
      </td>
      <td>
        <button class="toggle-btn ${d.p.ttrExcluded?'on':''}" onclick="toggleTTRExclude('${d.p.id}')">${d.p.ttrExcluded?'Excluded':'Included'}</button>
        ${d.p.ttrExcluded&&d.p.ttrExcludeReason?'<div style="font-size:11px; color:var(--ink-soft); margin-top:3px;">'+escapeHtml(d.p.ttrExcludeReason)+'</div>':''}
      </td>
    </tr>`).join('');

  main.innerHTML =
    '<div class="patient-header"><div><h1>TTR Overview</h1><div class="meta">Rosendaal linear interpolation · Extended TTR uses target ±0.2</div></div></div>'+
    '<div class="ttr-overview-header">'+
      '<div class="ttr-avg-box '+avgClass+'"><div class="av-label">Avg TTR</div><div class="av-value">'+(avgTTR===null?'—':avgTTR.toFixed(1)+'%')+'</div><div style="font-size:11px; color:var(--ink-soft); margin-top:4px;">'+included.length+' included</div></div>'+
      '<div class="ttr-avg-box '+(avgExtTTR===null?'':(avgExtTTR<60?'bad':'good'))+'"><div class="av-label">Avg Ext. TTR</div><div class="av-value" style="font-size:26px;">'+(avgExtTTR===null?'—':avgExtTTR.toFixed(1)+'%')+'</div><div style="font-size:11px; color:var(--ink-soft); margin-top:4px;">±0.2 range</div></div>'+
      '<div style="display:flex; flex-direction:column; gap:8px; justify-content:center;">'+
        '<div class="ttr-count-box"><div class="cv-label">Active</div><div class="cv-value">'+active.length+'</div></div>'+
        '<div class="ttr-count-box"><div class="cv-label">Below 60%</div><div class="cv-value" style="color:var(--accent)">'+below60+'</div></div>'+
      '</div>'+
      '<div style="display:flex; flex-direction:column; gap:8px; justify-content:center;">'+
        '<div class="ttr-count-box"><div class="cv-label">Excluded</div><div class="cv-value" style="color:var(--warn)">'+excluded.length+'</div></div>'+
        '<div class="ttr-count-box"><div class="cv-label">No data</div><div class="cv-value">'+noData.length+'</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<h3>All patients</h3>'+
      '<p class="hint" style="margin-bottom:12px;">Toggle Active/Inactive for clinic workflow; Included/Excluded for TTR average. Set exclusion reasons in the patient Profile tab.</p>'+
      '<table class="ttr-table"><thead><tr><th>Patient</th><th>MRN</th><th>Indication</th><th>Target INR</th><th>TTR</th><th>Ext. TTR</th><th>Status</th><th>Avg TTR</th></tr></thead><tbody>'+allRows+'</tbody></table>'+
    '</div>';
}

async function toggleActive(patientId){
  const p = patients.find(x => x.id === patientId);

// ---------- Defaulter detection ----------
function getDefaulters(allPatients, visitsCache){
  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = [];       // last appt date has passed
  const missingAppt = [];   // last visit has no next appointment set (incl. referrals)

  for(const p of allPatients){
    if(p.isActive === false) continue;
    const visits = (visitsCache[p.id]||[]).filter(v=>v.date);
    if(!visits.length) continue;
    const sorted = [...visits].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last = sorted[0];

    if(!last.nextAppt){
      // No next appointment recorded — capture these (especially referrals)
      missingAppt.push({
        patient:p,
        lastVisitDate:last.date,
        lastINR:last.inr,
        planAction:last.planAction,
        isReferral: last.planAction === "refer_mopd"
      });
    } else {
      const apptDate = new Date(last.nextAppt); apptDate.setHours(0,0,0,0);
      if(apptDate >= today) continue;
      const daysOverdue = Math.floor((today - apptDate)/86400000);
      overdue.push({patient:p, missedDate:last.nextAppt, daysOverdue, lastVisitDate:last.date, lastINR:last.inr, planAction:last.planAction});
    }
  }

  overdue.sort((a,b)=>b.daysOverdue-a.daysOverdue);
  // Referrals first in missingAppt list
  missingAppt.sort((a,b)=>(b.isReferral?1:0)-(a.isReferral?1:0));
  return {overdue, missingAppt};
}

  function overdueBadge(days){

      <div style="display:flex; flex-direction:column; gap:6px;">

        ${existing.resolved?'<span class="status-badge sb-active" style="text-align:center;">Resolved</span>':'<button class="btn" style="padding:6px 14px; font-size:12px;" onclick="resolveDAction(\''+escapeHtml(d.patient.id)+'\',\''+escapeHtml(d.missedDate||d.lastVisitDate)+'\',\''+escapeHtml(key)+'\')">Resolve</button>'}
      </div>
    </div>`;
  }

  const colHeaders = `<div style="display:grid; grid-template-columns:1.6fr 1.2fr 1.2fr 0.5fr; gap:10px; padding:0 0 8px; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-soft);">
    <div>Patient</div><div>Action taken</div><div>Notes</div><div></div></div>`;

  // Overdue section
  const overdueRows = overdue.length === 0
    ? '<div class="empty-state">No overdue appointments.</div>'

        const key = d.patient.id+"_"+(d.missedDate||d.lastVisitDate);
        const badge = `Missed appt: ${escapeHtml(d.missedDate)} ${overdueBadge(d.daysOverdue)}`;
        return actionRow(d, key, badge);

  // Missing appointment section

          ? `<span class="overdue-badge overdue-hi">Refer MOPD</span>`
          : `<span class="overdue-badge overdue-lo">No next appt set</span>`)
          + ` Last plan: ${escapeHtml(planLabel)}`;
        return actionRow({...d, missedDate:null}, key, badge);
      }).join('');

  main.innerHTML =
    '<div class="patient-header"><div><h1>Defaulter list</h1><div class="meta">Overdue appointments and patients without a scheduled follow-up</div></div>'+
    '<div class="header-stats">'+
      '<div class="stat-box '+(overdue.length>0?'alert':'ok')+'"><div class="label">Overdue</div><div class="value">'+overdue.length+'</div></div>'+
      '<div class="stat-box '+(missingAppt.filter(d=>d.isReferral).length>0?'alert':'')+'"><div class="label">No appt</div><div class="value">'+missingAppt.length+'</div></div>'+
    '</div></div>'+

    '<div class="card">'+
      '<h3>Overdue appointments</h3>'+
      '<p class="hint" style="margin-bottom:12px;">Last scheduled "Next appointment" date has passed with no new review recorded.</p>'+
      overdueRows+
    '</div>'+

    '<div class="card">'+
      '<h3>Missing next appointment <span style="font-size:11px; color:var(--accent); font-weight:400;">— includes MOPD referrals</span></h3>'+
      '<p class="hint" style="margin-bottom:12px;">Patients whose last review had no "Next appointment" date set. Referrals to MOPD are flagged in red — confirm they have been seen or arrange follow-up.</p>'+
      missingRows+
    '</div>';
}

async function saveDAction(patientId, missedDate, key){
  const action = document.getElementById("da_action_"+key)?.value||"";
  const notes = document.getElementById("da_notes_"+key)?.value||"";
  await saveDefaulterAction(patientId, missedDate, action, notes, false);
}
async function resolveDAction(patientId, missedDate, key){
  const action = document.getElementById("da_action_"+key)?.value||"";
  const notes = document.getElementById("da_notes_"+key)?.value||"";
  await saveDefaulterAction(patientId, missedDate, action, notes, true);
  await renderDefaultersView();
}
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
// Consecutive block patterns: high-dose days are Mon to Mon+n-1, low-dose days fill the rest
const BLOCK_SLOTS = {
  0:[], 1:[0], 2:[0,1], 3:[0,1,2], 4:[0,1,2,3],
  5:[0,1,2,3,4], 6:[0,1,2,3,4,5], 7:[0,1,2,3,4,5,6]
};

function getAchievableDoses(strengths){
  const doses = new Set();
  const halves = strengths.map(s => Math.round(s*5)/10);
  const all = [...strengths, ...halves].filter(x => x > 0);
  for(const a of all){ doses.add(Math.round(a*10)/10); }
  for(const a of all) for(const b of all){ const d=Math.round((a+b)*10)/10; if(d<=12) doses.add(d); }
  for(const a of all) for(const b of all) for(const c of all){ const d=Math.round((a+b+c)*10)/10; if(d<=12) doses.add(d); }
  return [...doses].sort((a,b)=>a-b);
}

function describeTablets(dose, strengths){
  const opts = [];
  for(const s of [...strengths].sort((a,b)=>b-a)){
    opts.push({mg:s, label:s+'mg'});
    opts.push({mg:Math.round(s*5)/10, label:'½×'+s+'mg'});
  }
  opts.sort((a,b)=>b.mg-a.mg);
  let remaining = Math.round(dose*10)/10;
  const used = {};
  for(const o of opts){
    while(remaining >= o.mg - 0.01){
      used[o.label] = (used[o.label]||0)+1;
      remaining = Math.round((remaining - o.mg)*10)/10;
    }
    if(Math.abs(remaining)<0.02) break;
  }
  if(Math.abs(remaining)>0.05) return null;
  return Object.entries(used).map(([k,n])=> n>1 ? n+'×'+k : k).join(' + ');
}

function generateRegimeSuggestions(targetTWD, strengths){
  if(!targetTWD || isNaN(targetTWD) || targetTWD<=0) return [];
  const doses = getAchievableDoses(strengths);
  const results = [];
  const seen = new Set();

  for(const dA of doses){
    for(const dB of doses){
      // RULE: no two adjacent day doses may differ by more than 1mg
      if(Math.abs(dA - dB) > 1.0 + 0.001) continue;

      for(let n=0; n<=7; n++){
        const actualTWD = Math.round((n*dA + (7-n)*dB)*10)/10;
        const error = Math.abs(actualTWD - targetTWD);
        if(error > 1.0) continue;

        const highDose = dA>=dB ? dA : dB;
        const lowDose = dA>=dB ? dB : dA;
        const nHigh = dA>=dB ? n : 7-n;
        const key = highDose+'x'+nHigh+'|'+lowDose+'x'+(7-nHigh);
        if(seen.has(key)) continue;
        seen.add(key);

        const highT = describeTablets(highDose, strengths);
        const lowT = describeTablets(lowDose, strengths);
        if(nHigh>0 && !highT) continue;
        if(nHigh<7 && !lowT) continue;

        let label, detail;
        if(nHigh===7 || highDose===lowDose){
          label = highDose+'mg every day (OD)';
          detail = 'Every day: '+highT;
        } else if(nHigh===0){
          label = lowDose+'mg every day (OD)';
          detail = 'Every day: '+lowT;
        } else {
          const hSlots = BLOCK_SLOTS[nHigh];
          const lSlots = BLOCK_SLOTS[7].filter(d=>!hSlots.includes(d));
          const hDayStr = nHigh===1 ? DAY_NAMES[hSlots[0]] : DAY_NAMES[hSlots[0]]+'–'+DAY_NAMES[hSlots[nHigh-1]];
          const lDayStr = (7-nHigh)===1 ? DAY_NAMES[lSlots[0]] : DAY_NAMES[lSlots[0]]+'–'+DAY_NAMES[lSlots[lSlots.length-1]];
          label = highDose+'mg ('+hDayStr+') + '+lowDose+'mg ('+lDayStr+')';
          detail = hDayStr+': '+highT+' | '+lDayStr+': '+lowT;
        }
        const diff = Math.abs(highDose - lowDose);
        const simplicity = (diff===0?20:0) + Math.round((1-diff)*10);
        results.push({label, detail, actualTWD, error, simplicity, highDose, lowDose, nHigh});
      }
    }
  }
  return results.sort((a,b)=>a.error-b.error || b.simplicity-a.simplicity).slice(0,5);
}

function renderRegimeSuggestions(targetTWD, strengths){
  const suggestions = generateRegimeSuggestions(parseFloat(targetTWD), strengths);
  const box = document.getElementById("regimeSuggestBox");
  if(!box) return;
  if(!targetTWD || suggestions.length===0){
    box.innerHTML = '<div class="hint">Enter a new TWD to generate regime options. (Max 1mg difference between any two days enforced.)</div>';
    return;
  }
  box.innerHTML = suggestions.map((s,i) =>
    '<div class="regime-card" id="regimeCard_'+i+'" onclick="selectRegime('+i+','+JSON.stringify(s).replace(/"/g,"&quot;")+')" title="Click to select this regime">'+
      '<div class="regime-label">'+escapeHtml(s.label)+'</div>'+
      '<div class="regime-twd">TWD: '+s.actualTWD+'mg/week'+(s.error>0.05?' (±'+s.error.toFixed(1)+'mg from target)':'')+'</div>'+
      '<div style="font-size:11.5px; color:var(--ink-soft); margin-top:3px;">'+escapeHtml(s.detail)+'</div>'+
    '</div>'
  ).join('');
}

let selectedRegimeLabel = "";
function selectRegime(idx, s){
  selectedRegimeLabel = s.label + ' — TWD ' + s.actualTWD + 'mg/week';
  document.getElementById("rv_new_twd").value = s.actualTWD;
  document.querySelectorAll(".regime-card").forEach((el,i) => el.classList.toggle("selected", i===idx));
}

async function renderSettingsView(){
  const main = document.getElementById("main");
  if(!configOk){ main.innerHTML = configWarningHtml(); return; }
  const rules = await getRules();
  rulesDraft = JSON.parse(JSON.stringify(rules));
  if(!rulesDraft.tabletStrengths) rulesDraft.tabletStrengths = [...DEFAULT_RULES.tabletStrengths];

  main.innerHTML =
    '<div class="patient-header"><div><h1>Dosing rules</h1><div class="meta">Used for the instant rule-based suggestion and regime suggestions across all patients</div></div></div>'+
    '<div class="card"><h3>Available tablet strengths (mg)</h3>'+
      '<p class="hint" style="margin-bottom:10px;">Comma-separated list of available warfarin tablet strengths at your clinic. Half tablets are automatically considered when generating regime suggestions.</p>'+
      '<div class="field" style="max-width:340px;"><label>Available strengths (mg)</label><input id="tablet_strengths" value="'+escapeHtml(rulesDraft.tabletStrengths.join(", "))+'" placeholder="e.g. 1, 2, 3, 5"></div>'+
    '</div>'+
    '<div class="card"><h3>If INR is below target range</h3>'+
      '<p class="hint" style="margin-bottom:12px;">Tiers are checked from smallest to largest deviation.</p>'+
      '<div id="belowRows"></div>'+
      '<button class="btn" onclick="addTier(\'below\')">+ Add tier</button>'+
    '</div>'+
    '<div class="card"><h3>If INR is above target range</h3>'+
      '<p class="hint" style="margin-bottom:12px;">For INR above target. Specify withhold days before resuming at reduced dose.</p>'+
      '<div id="aboveRows"></div>'+
      '<button class="btn" onclick="addTier(\'above\')">+ Add tier</button>'+
    '</div>'+
    '<div class="row-actions"><button class="btn btn-primary" onclick="saveRulesClick()">Save rules</button></div>';

  renderTierRows();
}

function belowRowHtml(t,i){
  return '<div class="grid" style="grid-template-columns:1.1fr 1.1fr 2fr auto; gap:10px; margin-bottom:10px; align-items:end;">'+
    '<div class="field"><label>Up to (INR below target)</label><input type="number" step="0.1" value="'+t.maxDeficit+'" oninput="updateTier(\'below\','+i+',\'maxDeficit\',this.value)"></div>'+
    '<div class="field"><label>Increase TWD by (%)</label><input type="number" step="1" value="'+t.increasePct+'" oninput="updateTier(\'below\','+i+',\'increasePct\',this.value)"></div>'+
    '<div class="field"><label>Note shown to user</label><input value="'+escapeHtml(t.note||'')+'" oninput="updateTier(\'below\','+i+',\'note\',this.value)"></div>'+
    '<button class="btn btn-danger" style="padding:9px 12px;" onclick="removeTier(\'below\','+i+')">Remove</button>'+
  '</div>';
}
function aboveRowHtml(t,i){
  return '<div class="grid" style="grid-template-columns:1fr 1fr 0.8fr 2fr auto; gap:10px; margin-bottom:10px; align-items:end;">'+
    '<div class="field"><label>Up to (INR above target)</label><input type="number" step="0.1" value="'+t.maxExcess+'" oninput="updateTier(\'above\','+i+',\'maxExcess\',this.value)"></div>'+
    '<div class="field"><label>Reduce TWD by (%)</label><input type="number" step="1" value="'+t.reducePct+'" oninput="updateTier(\'above\','+i+',\'reducePct\',this.value)"></div>'+
    '<div class="field"><label>Withhold (days)</label><input type="number" step="1" value="'+(t.withholdDays||0)+'" oninput="updateTier(\'above\','+i+',\'withholdDays\',this.value)"></div>'+
    '<div class="field"><label>Note shown to user</label><input value="'+escapeHtml(t.note||'')+'" oninput="updateTier(\'above\','+i+',\'note\',this.value)"></div>'+
    '<button class="btn btn-danger" style="padding:9px 12px;" onclick="removeTier(\'above\','+i+')">Remove</button>'+
  '</div>';
}
function renderTierRows(){
  document.getElementById("belowRows").innerHTML = rulesDraft.below.map(belowRowHtml).join("") || '<div class="empty-state">No tiers yet — add one below.</div>';
  document.getElementById("aboveRows").innerHTML = rulesDraft.above.map(aboveRowHtml).join("") || '<div class="empty-state">No tiers yet — add one below.</div>';
}
function updateTier(group, idx, key, value){
  rulesDraft[group][idx][key] = (key === "note") ? value : parseFloat(value);
}
function addTier(group){
  if(group === "below") rulesDraft.below.push({maxDeficit:1, increasePct:10, note:""});
  else rulesDraft.above.push({maxExcess:1, reducePct:10, withholdDays:0, note:""});
  renderTierRows();
}
function removeTier(group, idx){
  rulesDraft[group].splice(idx,1);
  renderTierRows();
}

async function saveRulesClick(){
  const strengthsInput = document.getElementById("tablet_strengths");
  if(strengthsInput){
    const parsed = strengthsInput.value.split(",").map(s=>parseFloat(s.trim())).filter(x=>!isNaN(x)&&x>0);
    rulesDraft.tabletStrengths = parsed.length > 0 ? parsed : DEFAULT_RULES.tabletStrengths;
  }
  rulesDraft.below.sort((a,b) => a.maxDeficit - b.maxDeficit);
  rulesDraft.above.sort((a,b) => a.maxExcess - b.maxExcess);
  await saveRulesRow(rulesDraft);
  rulesCache = rulesDraft;
  renderTierRows();
  alert("Dosing rules saved.");
}

// ---------- init ----------
async function init(){
  initSupabase();
  if(!configOk){
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appRoot").style.display = "flex";
    await renderMain();
    return;
  }
  const {data} = await sb.auth.getSession();
  if(data.session){
    currentSession = data.session;
    await onAuthed();
  } else {
    showLoginScreen();
  }
  sb.auth.onAuthStateChange((event, session) => {
    if(event === "SIGNED_OUT"){
      currentSession = null;
      showLoginScreen();
    }
  });
}
init();
